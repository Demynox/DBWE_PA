{% extends "base.html" %}
{% block title %}Fahrzeug anlegen | Scootermania{% endblock %}
{% block content %}
<div class="form-card">
    <h1>Fahrzeug anlegen</h1>
    <form method="POST" class="stack two-columns">
        <label>Code
            <input type="text" name="code" placeholder="z. B. SC-ZRH-1001" required>
        </label>
        <label>Modellname
            <input type="text" name="model_name" placeholder="z. B. Urban Glide E-Scooter" required>
        </label>
        <label>Akku in %
            <input type="number" name="battery_level" min="0" max="100" value="100" required>
        </label>
        <label>Stadt
            <input type="text" name="city" value="Zürich" required>
        </label>
        <label>Latitude
            <input type="number" step="0.000001" name="latitude" value="47.376887" required>
        </label>
        <label>Longitude
            <input type="number" step="0.000001" name="longitude" value="8.541694" required>
        </label>
        <div class="full">
            <button class="button primary" type="submit">Fahrzeug speichern</button>
        </div>
    </form>
</div>
{% endblock %}
